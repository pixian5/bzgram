name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 单元测试
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & run tests via SPM
        run: |
          swift build
          swift test --parallel

  # iOS 构建
  build-ios-project:
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -project BZGram.xcodeproj \
            -scheme BZGram \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests (xcodebuild)
        run: |
          xcodebuild \
            -project BZGram.xcodeproj \
            -scheme BZGram \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            test || true

      - name: Package Xcode project for local IPA build
        run: |
          VERSION="${{ github.run_number }}"
          mkdir -p dist
          zip -r "dist/BZGram-iOS-project-v${VERSION}.zip" \
            BZGram.xcodeproj \
            BZGram \
            Package.swift \
            README.md \
            project.yml

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.run_number }}"
          TAG="v${VERSION}"
          ASSET="dist/BZGram-iOS-project-v${VERSION}.zip"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "iOS Project ${TAG}" \
              --notes "Automated build from commit ${{ github.sha }}"
          fi
