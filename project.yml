name: BZGram
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: BZGram
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
configs:
  Debug: debug
  Release: release
packages:
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: 1.5.2-tdlib-1.8.63-8ff05a0e
targets:
  BZGramCore:
    type: framework
    platform: iOS
    sources:
      - path: BZGram/Sources/Core
    dependencies:
      - package: TDLibKit
    settings:
      base:
        PRODUCT_NAME: BZGramCore
        PRODUCT_MODULE_NAME: BZGramCore
        PRODUCT_BUNDLE_IDENTIFIER: com.pixian5.bzgram.core
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
  BZGram:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BZGram/Sources/App
      - path: BZGram/Sources/Views
    dependencies:
      - target: BZGramCore
    settings:
      base:
        PRODUCT_NAME: BZGram
        PRODUCT_MODULE_NAME: BZGram
        PRODUCT_BUNDLE_IDENTIFIER: com.pixian5.bzgram
        INFOPLIST_KEY_BZGRAM_TELEGRAM_API_ID: ""
        INFOPLIST_KEY_BZGRAM_TELEGRAM_API_HASH: ""
        INFOPLIST_KEY_BZGRAM_TELEGRAM_USE_TEST_DC: NO
        TARGETED_DEVICE_FAMILY: 1,2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
    scheme:
      testTargets:
        - BZGramTests
      gatherCoverageData: true
  BZGramTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BZGram/Tests
    dependencies:
      - target: BZGramCore
    settings:
      base:
        PRODUCT_NAME: BZGramTests
        PRODUCT_MODULE_NAME: BZGramTests
        PRODUCT_BUNDLE_IDENTIFIER: com.pixian5.bzgram.tests
